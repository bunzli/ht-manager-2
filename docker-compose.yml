services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    volumes:
      - ./server/src:/app/server/src
      - ./server/prisma:/app/server/prisma
      - ./.env:/app/.env
      - server_data:/app/server/prisma/data
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    command: npx tsx watch src/index.ts

  client:
    image: node:20-alpine
    working_dir: /app/client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app/client
      - client_modules:/app/client/node_modules
    command: sh -c "npm install && npx vite --host 0.0.0.0"
    environment:
      - NODE_ENV=development

volumes:
  server_data:
  client_modules:
