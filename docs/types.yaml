special_types:
  lineup:
    type: JSON-formatted string
    structure:
      positions:
        description:
          - array of all positions
          - slots 0-13 = players on field
          - slots 14-18 = substitutes in order: goalkeeper, defender, midfielder, forward, winger
          - slots 19-20 = captain and set pieces taker
          - slots 21-31 = penalty takers
          - each slot must be sent, use id: 0 if empty
        item:
          id: playerId
          behaviour: MatchBehaviourID

      settings:
        tactic: MatchTacticType
        speechLevel: MatchTeamAttitude
        newLineup: empty string

      substitutions:
        description:
          - array with 0 to 5 items
        item:
          playerin: playerId
          playerout: playerId
          orderType: matchOrderTypeID   # 1=substitution/behaviour change, 3=position swap
          min: MatchMinuteCriteria
          pos: "0-13 after substitution"
          beh: MatchBehaviourID
          card: RedCardCriteria
          standing: GoalDiffCriteria