primitive_types:
  Boolean:
    true: True
    false: False

  Boolean*:
    true: True
    false: False
    empty: not given

  Bit:
    0: False
    1: True

  Char:
    format: "[a-Z,0-9]"
    description: single character

  DateTime:
    format: "YYYY-MM-DD HH:MM:SS"
    description: Internet Date/Time Format in CE(ST), RFC3339 / ISO8601

  DateTime*:
    format: "YYYY-MM-DD HH:MM:SS"
    empty_date: "0001-01-01 00:00:00"

  Decimal:
    range: "decimal.MIN_VALUE - decimal.MAX_VALUE"
    description: high precision numeric, suitable for financial values

  Float:
    range: "float.MIN_VALUE - float.MAX_VALUE"

  Integer:
    range: "int.MIN_VALUE - int.MAX_VALUE"

  unsigned_Integer:
    range: "0 - uint.MAX_VALUE"

  unsigned_Integer*:
    range: "0 - uint.MAX_VALUE"
    empty: true

  String:
    description: array of chars

  String*:
    description: array of chars
    empty: true

  String_HTML_encoded:
    description: HTML encoded string

  URI:
    description: Uniform Resource Identifier

  Money:
    type: integer
    currency: SEK

