services:
  ht-manager:
    image: ghcr.io/bunzli/ht-manager-2:latest
    container_name: ht-manager
    ports:
      - "3001:3001"
    volumes:
      - ht-manager-data:/app/server/prisma/data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./prisma/data/prod.db
      - CHPP_CONSUMER_KEY=${CHPP_CONSUMER_KEY}
      - CHPP_CONSUMER_SECRET=${CHPP_CONSUMER_SECRET}
      - CHPP_ACCESS_TOKEN=${CHPP_ACCESS_TOKEN}
      - CHPP_ACCESS_TOKEN_SECRET=${CHPP_ACCESS_TOKEN_SECRET}
      - CHPP_TEAM_ID=${CHPP_TEAM_ID}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower-ht-manager
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 ht-manager
    restart: unless-stopped

volumes:
  ht-manager-data:
